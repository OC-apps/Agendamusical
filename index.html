<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OC Agenda">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.svg">
<title>OC Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#050505;min-height:100vh;font-family:'Outfit',sans-serif;overflow-x:hidden}

input,select,textarea{font-family:'Outfit',sans-serif;color-scheme:dark}

/* ── BACKGROUND ── */
.app-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.app-bg::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,var(--ac-glow) 0%,transparent 65%);top:-250px;right:-250px;animation:bgf1 18s ease-in-out infinite}
.app-bg::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,var(--ac-glow2) 0%,transparent 65%);bottom:-150px;left:-150px;animation:bgf2 22s ease-in-out infinite}
@keyframes bgf1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-60px,80px) scale(1.05)}}
@keyframes bgf2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(70px,-60px) scale(1.08)}}

.app-particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.app-particle{position:absolute;opacity:0.035;animation:apf linear infinite}
@keyframes apf{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:0.035}90%{opacity:0.035}100%{transform:translateY(-20px) rotate(360deg);opacity:0}}

.app-grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ── KEYFRAMES ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px) scale(0.94)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.7}}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.09)}30%{transform:scale(1)}45%{transform:scale(1.06)}60%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(120vh) rotate(720deg);opacity:0}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4.5);opacity:0}}
@keyframes cardEnter{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 transparent,0 4px 20px rgba(0,0,0,0.4)}50%{box-shadow:0 0 0 1px var(--ac-border),0 4px 30px var(--ac-glow)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes onboardIn{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes navDotIn{from{transform:translateX(-50%) scaleX(0)}to{transform:translateX(-50%) scaleX(1)}}
@keyframes modalIn{from{opacity:0;transform:translateY(28px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes statIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}

/* ── EVENT CARDS ── */
.ev-card{
  transition:transform 0.18s cubic-bezier(.2,.8,.2,1), box-shadow 0.18s ease, border-color 0.2s;
  -webkit-tap-highlight-color:transparent;
  position:relative;
  overflow:hidden;
}
.ev-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg, var(--ac), rgba(var(--ac-rgb),0.3));
  border-radius:0 2px 2px 0;
  opacity:0;transition:opacity 0.2s;
}
.ev-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  pointer-events:none;
}
.ev-card:hover::before,.ev-card:active::before{opacity:1}
.ev-card:hover{box-shadow:0 6px 28px rgba(0,0,0,0.45) !important;}
.ev-card:active{transform:scale(0.975)!important;box-shadow:0 2px 12px rgba(0,0,0,0.4)!important}

/* ── BUTTONS ── */
.btn-rip{position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.btn-rip::after{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;background:rgba(255,255,255,0.3);border-radius:50%;transform:scale(0) translate(-50%,-50%);transform-origin:center;opacity:0}
.btn-rip:active::after{animation:ripple 0.55s ease-out}

/* ── GLASS ── */
.glass{
  background:rgba(5,5,5,0.94)!important;
  backdrop-filter:blur(32px) saturate(1.6)!important;
  -webkit-backdrop-filter:blur(32px) saturate(1.6)!important;
  border:1px solid rgba(255,255,255,0.09)!important;
  box-shadow:0 24px 64px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.07), inset 0 -1px 0 rgba(0,0,0,0.4)!important;
}

/* ── LOGO ── */
.logo-beat{animation:heartbeat 4s ease-in-out infinite}

/* ── STAT NUMBERS ── */
.stat-num{animation:countUp 0.55s cubic-bezier(.2,.8,.2,1) both}

/* ── NEXT EVENT ── */
.next-glow{animation:glowPulse 4s ease-in-out infinite}

/* ── CONFETTI ── */
.confetti-piece{position:fixed;width:8px;height:8px;top:-10px;z-index:10000;border-radius:2px;animation:confetti-fall 2.5s ease-in forwards;pointer-events:none}

/* ── SUGGESTIONS DROPDOWN ── */
.sug{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:#111;
  border:1px solid var(--ac-border);
  border-radius:12px;
  z-index:10;max-height:140px;overflow-y:auto;
  box-shadow:0 12px 40px rgba(0,0,0,0.6);
}
.sug-i{
  padding:10px 14px;color:#ccc;font-size:13px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:background 0.12s, color 0.12s;
}
.sug-i:last-child{border-bottom:none}
.sug-i:hover,.sug-i:active{background:var(--ac-bg);color:#fff}

/* ── PALETTE DOTS ── */
.palette-dot{width:28px;height:28px;border-radius:8px;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.palette-dot:hover{transform:scale(1.18)}

/* ── SETTINGS SECTIONS ── */
.card-section{
  background:linear-gradient(145deg, rgba(255,255,255,0.028) 0%, rgba(255,255,255,0.018) 100%);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:20px;
  padding:20px;
  margin-bottom:10px;
  transition:border-color 0.25s, box-shadow 0.25s;
  position:relative;
  overflow:hidden;
}
.card-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  pointer-events:none;
}
.card-section:hover{border-color:rgba(255,255,255,0.11);box-shadow:0 8px 32px rgba(0,0,0,0.25)}
.card-section h3{
  color:#fff;font-size:14px;font-weight:700;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
  letter-spacing:-0.2px;
}

/* ── CLAUSULAS ── */
.clausula-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.clausula-num{
  min-width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px;
}

/* ── INPUT FOCUS ── */
input:focus, select:focus, textarea:focus{
  outline:none !important;
  border-color:var(--ac) !important;
  box-shadow:0 0 0 3px var(--ac-glow), 0 2px 8px rgba(0,0,0,0.3) !important;
  background:rgba(var(--ac-rgb),0.04) !important;
}

/* ── INPUT BASE ENHANCED ── */
input, select, textarea {
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s !important;
}

/* ── BOTTOM NAV ENHANCED ── */
.bottom-nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:9px 0 12px;cursor:pointer;position:relative;
  transition:opacity 0.15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.bottom-nav-item:active{opacity:0.7}
.bottom-nav-icon{
  font-size:20px;
  transition:transform 0.25s cubic-bezier(.34,1.56,.64,1), filter 0.2s;
  line-height:1;
}
.bottom-nav-item.active .bottom-nav-icon{transform:scale(1.22) translateY(-2px); filter:drop-shadow(0 0 8px var(--ac));}
.bottom-nav-label{
  font-size:9px;font-weight:700;margin-top:3px;
  letter-spacing:0.4px;transition:color 0.2s;
}
.bottom-nav-dot{
  position:absolute;top:0;left:50%;
  width:32px;height:3px;border-radius:0 0 4px 4px;
  background:linear-gradient(90deg, rgba(var(--ac-rgb),0.5), var(--ac), rgba(var(--ac-rgb),0.5));
  transform:translateX(-50%) scaleX(0);
  transform-origin:center;
  transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 2px 8px var(--ac-glow);
}
.bottom-nav-item.active .bottom-nav-dot{transform:translateX(-50%) scaleX(1)}

/* ── STAT CARDS ── */
.stat-card{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.015) 100%) !important;
  border:1px solid rgba(255,255,255,0.07) !important;
  border-radius:16px !important;
  padding:14px 14px !important;
  transition:border-color 0.25s, transform 0.15s, box-shadow 0.25s;
}
.stat-card:active{transform:scale(0.97)}
.stat-card:hover{border-color:var(--ac-border) !important; box-shadow:0 0 20px var(--ac-glow) !important;}
.stat-card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
}
.stat-card::after{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, transparent, var(--ac-border), transparent);
  opacity:0.6;
}

/* ── TODAY BANNER ── */
.today-banner{
  border-radius:14px !important;
  padding:12px 16px !important;
  margin-bottom:12px !important;
  position:relative;overflow:hidden;
}
.today-banner::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg, var(--ac-bg) 0%, transparent 60%);
  pointer-events:none;
}
.today-banner::after{
  content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;
  background:linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.04) 50%, transparent 75%);
  animation:shimmer 3s infinite;pointer-events:none;
}

/* ── NEXT EVENT CARD ── */
.next-event-card{
  border-radius:18px !important;
  padding:18px !important;
  margin-bottom:12px !important;
  position:relative;overflow:hidden;
  cursor:pointer;
}
.next-event-card::before{
  content:'';position:absolute;
  top:-40px;right:-40px;width:140px;height:140px;
  border-radius:50%;
  background:radial-gradient(circle, var(--ac-glow) 0%, transparent 70%);
  pointer-events:none;
}
.next-event-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, var(--ac-border), transparent);
  pointer-events:none;
}

/* ── FORM MODAL ── */
.form-modal{
  animation:modalIn 0.32s cubic-bezier(.2,.8,.2,1) !important;
}

/* ── PREMIUM SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(var(--ac-rgb),0.25);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(var(--ac-rgb),0.45)}

/* ── HEADER ── */
.app-header-logo{
  border-radius:14px !important;
  box-shadow:0 0 0 1px var(--ac-border), 0 0 28px var(--ac-glow) !important;
}

/* ── SEARCH INPUT ── */
.search-input-wrap{position:relative}
.search-input-wrap::before{
  content:'';position:absolute;
  inset:-1px;border-radius:13px;
  background:linear-gradient(135deg, var(--ac-border), transparent, var(--ac-border));
  opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:0;
}
.search-input-wrap:focus-within::before{opacity:1}

/* ── SHIMMER SKELETON ── */
.shimmer{
  background:linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.03) 75%);
  background-size:200% 100%;
  animation:shimmer 1.8s infinite;
}

/* ── TOAST ── */
.toast-notif{
  position:fixed;bottom:78px;left:50%;
  transform:translateX(-50%);
  z-index:9999;
  backdrop-filter:blur(18px) !important;
  -webkit-backdrop-filter:blur(18px) !important;
  border-radius:14px !important;
  padding:11px 20px !important;
  font-size:13px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,0.6) !important;
  white-space:nowrap;
  animation:toastIn 0.3s cubic-bezier(.2,.8,.2,1) !important;
  letter-spacing:-0.1px;
}

/* ── EMPTY STATE ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  padding:56px 20px;text-align:center;
}
.empty-state-icon{
  font-size:52px;margin-bottom:14px;
  animation:heartbeat 3s ease-in-out infinite;
  filter:grayscale(0.3);
}
</style>
</head>

function hexToRgb(hex){

  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return{r:r,g:g,b:b};
}

  s.setProperty("--ac",hex);

}

function ct(ev,pkgs,prices,mpkgs){
  if(ev.tipo==="Bloqueado")return 0;
  if(ev.tipo==="Por hora"){
    if(ev.precioHora)return(Number(ev.horas)||1)*ev.precioHora;
    var pkg=pkgs.find(function(p){return p.id===ev.paquete_id});
    return(Number(ev.horas)||1)*(pkg?pkg.precio:(pkgs[0]?pkgs[0].precio:0));
  }
  if(isTipo2(ev.tipo,undefined)){
    if(ev.precioMisas)return ev.precioMisas;
    if(mpkgs){var mp=mpkgs.find(function(p){return p.id===ev.misa_paquete_id});if(mp)return mp.precio}
    return prices.misas||0;
  }
  return 0;
}

function calcEnd(hora,hrs){if(!hora)return"";var p=hora.split(":");var eH=parseInt(p[0])+(parseInt(hrs)||1);var eM=p[1];var nd=eH>=24;if(nd)eH-=24;return ft(String(eH).padStart(2,"0")+":"+eM)+(nd?" (sig.)":"")}

function genRecibo(ev,evs,cfg,pkgs,prices,mpkgs){
  var J=window.jspdf.jsPDF;
  var doc=new J({unit:"mm",format:"a4"});
  var W=210,H=297,ml=15,mr=15,cw=W-ml-mr;
  var ac=hexToRgb(cfg.color||"#9333EA");
  var acH=cfg.color||"#9333EA";
  var total=ct(ev,pkgs,prices,mpkgs);
  var anticipo=Number(ev.anticipo)||0;
  var saldo=total-anticipo;
  var folioN=folio(ev.id,evs,cfg);

  // ── HEADER BAND ──────────────────────────────────────────
  // Main color bar
  doc.setFillColor(ac.r,ac.g,ac.b);
  doc.rect(0,0,W,42,"F");
  // Subtle dark overlay stripe at bottom of header
  doc.setFillColor(0,0,0,0.3);
  // Decorative accent strip
  var dr=Math.max(0,ac.r-40),dg=Math.max(0,ac.g-40),db=Math.max(0,ac.b-40);
  doc.setFillColor(dr,dg,db);
  doc.rect(0,38,W,4,"F");

  // Logo (if exists)

    doc.text(lines,ml+60,rowY);
  });
  y+=rows.length*7.5+6;

  if(ev.notas){
    doc.setFillColor(248,248,252);
    doc.setDrawColor(200,200,210);
    doc.setLineWidth(0.3);
    var notasLines=doc.splitTextToSize(ev.notas,cw-10);
    var notasH=notasLines.length*5+8;

    doc.setFontSize(7.5);
    doc.setTextColor(110,110,120);
    doc.text("Notas:",ml+3,y+4);
    doc.setFont("helvetica","normal");

  // ── FINANCIAL SUMMARY BOX ───────────────────────────────

  doc.setFontSize(9);
  doc.setTextColor(90,90,100);

  // Divider

  doc.setDrawColor(180,180,200);
  doc.setLineWidth(0.3);
  doc.line(ml+8,bx,W-mr-8,bx);
  bx+=7;

  // Saldo row
  doc.setFont("helvetica","bold");
  doc.setFontSize(9.5);
  doc.setTextColor(90,90,100);
  doc.text(saldo<=0?"ESTADO:":"SALDO PENDIENTE:",ml+10,bx);

    doc.setFont("helvetica","bold");
    doc.setFontSize(13);
    doc.setTextColor(0,140,80);
    doc.text("PAGADO ✓",W-mr-5,bx,{align:"right"});
  }else{
    doc.setFont("helvetica","bold");
    doc.setFontSize(15);
    doc.setTextColor(180,30,30);
    doc.text(fm(saldo),W-mr-5,bx,{align:"right"});
  }
  y+=boxH+10;

  // ── CLÁUSULAS / CONTRATO ─────────────────────────────────
  var clausulas=cfg.clausulas||[];

    var clausH=18+(clausulas.length*16);
    if(y+clausH>H-40){doc.addPage();y=18}

    doc.setDrawColor(200,200,210);
    doc.setLineWidth(0.3);
    doc.line(ml,y,W-mr,y);
    y+=8;

    doc.setFont("helvetica","bold");
    doc.setFontSize(8.5);
    doc.setTextColor(ac.r,ac.g,ac.b);
    doc.text("TÉRMINOS Y CONDICIONES",ml,y);
    y+=8;

    clausulas.forEach(function(cl,idx){
      if(y>H-40){doc.addPage();y=18}
      // Numbered badge
      doc.setFillColor(ac.r,ac.g,ac.b);
      doc.circle(ml+3,y-1,3,"F");
      doc.setTextColor(255,255,255);
      doc.setFont("helvetica","bold");
      doc.setFontSize(6);
      doc.text(String(idx+1),ml+3,y-0.5,{align:"center"});
      // Clause text
      doc.setFont("helvetica","normal");
      doc.setFontSize(7.5);
      doc.setTextColor(55,55,65);
      var clLines=doc.splitTextToSize(cl,cw-12);
      doc.text(clLines,ml+9,y);
      y+=clLines.length*4.8+4;
    });

    y+=6;
    // Signature lines
    if(y+28>H-20){doc.addPage();y=18}
    doc.setDrawColor(160,160,170);
    doc.setLineWidth(0.4);
    // Artist sig line
    doc.line(ml,y+18,ml+65,y+18);
    if(cfg.firma){try{doc.addImage(cfg.firma,"PNG",ml,y+2,65,14,"","FAST");}catch(e){}}
    doc.setFont("helvetica","normal");
    doc.setFontSize(7);
    doc.setTextColor(120,120,130);
    doc.text(cfg.nombre||"Artista",ml+32,y+23,{align:"center"});
    doc.text("Prestador del Servicio",ml+32,y+27,{align:"center"});
    // Client sig line
    var csx=W-mr-65;
    doc.line(csx,y+18,W-mr,y+18);
    doc.text(ev.contacto||"Cliente",csx+32,y+23,{align:"center"});
    doc.text("Firma del Contratante",csx+32,y+27,{align:"center"});
    y+=32;
  }

  // ── FOOTER ──────────────────────────────────────────────
  var footY=H-16;
  doc.setDrawColor(210,210,218);
  doc.setLineWidth(0.3);
  doc.line(ml,footY-5,W-mr,footY-5);
  doc.setFont("helvetica","normal");
  doc.setFontSize(7);
  doc.setTextColor(150,150,160);
  doc.text("Emitido: "+new Date().toLocaleString("es-MX"),ml,footY);
  if(cfg.website){
    doc.text(cfg.website,W/2,footY,{align:"center"});
  }
  // Redes
  var socTxt=[];
  if(cfg.redes&&cfg.redes.instagram)socTxt.push("IG: "+cfg.redes.instagram);
  if(cfg.redes&&cfg.redes.facebook)socTxt.push("FB: "+cfg.redes.facebook);
  if(socTxt.length){
    doc.setFontSize(6);
    doc.text(socTxt.join("  ·  "),W/2,footY+4,{align:"center"});
  }
  // OC Agenda attribution – small, non-invasive
  doc.setFont("helvetica","italic");
  doc.setFontSize(6);
  doc.setTextColor(185,185,195);
  doc.text("OC Agenda · Oscar Caldera",W-mr,footY,{align:"right"});

  doc.save("Recibo_"+folioN+"_"+(ev.contacto||"").replace(/\s/g,"_")+".pdf");
}

function genReporte(events,fYear,fMonth,cfg,pkgs,prices,mpkgs){
  var J=window.jspdf.jsPDF,doc=new J({unit:"mm",format:"letter"});
  var W=216,ac=hexToRgb(cfg.color);
  var yr=parseInt(fYear)||new Date().getFullYear();
  var mo=fMonth!=="all"?parseInt(fMonth):-1;
  var moName=mo>=0?MS[mo]:"Año Completo";
  var evs=events.filter(function(x){var d=new Date(x.fecha+"T00:00:00");return d.getFullYear()===yr&&(mo<0||d.getMonth()===mo)}).sort(function(a,b){return new Date(a.fecha)-new Date(b.fecha)});
  var tI=0,tA=0,nConf=0,nCanc=0;
  evs.forEach(function(x){if(x.estado!=="Cancelado"){tI+=ct(x,pkgs,prices,mpkgs);tA+=(x.anticipo||0)}if(x.estado==="Confirmado")nConf++;if(x.estado==="Cancelado")nCanc++;});

  // Header
  doc.setFillColor(ac.r,ac.g,ac.b);
  doc.rect(0,0,W,36,"F");
  doc.setFillColor(Math.max(0,ac.r-40),Math.max(0,ac.g-40),Math.max(0,ac.b-40));
  doc.rect(0,32,W,4,"F");
  if(cfg.logo){try{doc.addImage(cfg.logo,"PNG",14,7,20,20,"","FAST");}catch(e){}}
  doc.setTextColor(255,255,255);
  doc.setFontSize(18);
  doc.setFont("helvetica","bold");
  doc.text(cfg.nombre||"Artista",cfg.logo?38:108,16,{align:cfg.logo?"left":"center"});
  doc.setFontSize(9);
  doc.setFont("helvetica","normal");
  doc.text("REPORTE DE EVENTOS — "+moName+" "+yr,cfg.logo?38:108,25,{align:cfg.logo?"left":"center"});

  var y=46;
  // KPI Cards row
  var cards=[
    {l:"Eventos",v:String(evs.length),c:[ac.r,ac.g,ac.b]},
    {l:"Ingresos",v:fm(tI),c:[0,135,80]},
    {l:"Cobrado",v:fm(tA),c:[0,100,200]},
    {l:"Pendiente",v:fm(tI-tA),c:[180,100,0]},
    {l:"Confirmados",v:String(nConf),c:[0,150,80]},
    {l:"Cancelados",v:String(nCanc),c:[160,30,30]}
  ];
  var cw2=(W-28)/3;
  cards.forEach(function(card,i){
    var cx=14+(i%3)*(cw2+2),cy=y+(Math.floor(i/3)*16);
    doc.setFillColor(245,245,250);
    doc.setDrawColor(card.c[0],card.c[1],card.c[2]);
    doc.setLineWidth(0.5);
    doc.roundedRect(cx,cy,cw2,13,2,2,"FD");
    doc.setFillColor(card.c[0],card.c[1],card.c[2]);
    doc.rect(cx,cy,3,13,"F");
    doc.setFont("helvetica","bold");
    doc.setFontSize(7);
    doc.setTextColor(100,100,110);
    doc.text(card.l,cx+6,cy+5);
    doc.setFont("helvetica","bold");
    doc.setFontSize(10);
    doc.setTextColor(20,20,30);
    doc.text(card.v,cx+6,cy+11);
  });
  y+=36;

  // Table
  doc.setDrawColor(ac.r,ac.g,ac.b);
  doc.setLineWidth(0.5);
  doc.line(14,y,W-14,y);
  y+=5;
  doc.setFont("helvetica","bold");
  doc.setFontSize(7.5);
  doc.setTextColor(ac.r,ac.g,ac.b);
  var cols=[14,38,60,80,130,155,180];
  var headers=["FOLIO","FECHA","TIPO","CLIENTE","ESTADO","TOTAL","ANTICIPO"];
  headers.forEach(function(h,i){doc.text(h,cols[i],y)});
  y+=4;
  doc.setDrawColor(200,200,210);
  doc.setLineWidth(0.3);
  doc.line(14,y,W-14,y);
  y+=5;
  doc.setFont("helvetica","normal");
  doc.setFontSize(7.5);

  evs.forEach(function(ev,i){
    if(y>248){doc.addPage();y=20}
    if(i%2===0){doc.setFillColor(250,250,252);doc.rect(14,y-3.5,W-28,7,"F")}
    doc.setTextColor(40,40,50);
    doc.text(folio(ev.id,events,cfg),cols[0],y);
    doc.text(fd(ev.fecha),cols[1],y);
    doc.text((ev.tipo||"").slice(0,12),cols[2],y);
    doc.text((ev.contacto||"").slice(0,22),cols[3],y);
    var estC=EST_C[ev.estado]||EST_C.Pendiente;
    var ec=hexToRgb(estC.bg);
    doc.setTextColor(ec.r,ec.g,ec.b);
    doc.text(ev.estado,cols[4],y);
    doc.setTextColor(20,20,30);
    doc.text(fm(ct(ev,pkgs,prices,mpkgs)),cols[5],y);
    doc.setTextColor(0,130,70);
    doc.text(fm(ev.anticipo||0),cols[6],y);
    y+=7;
  });

  if(evs.length===0){
    doc.setFont("helvetica","italic");
    doc.setFontSize(9);
    doc.setTextColor(150,150,160);
    doc.text("No hay eventos en este período.",108,y+10,{align:"center"});
    y+=20;
  }

  // Footer
  var footY=266;
  doc.setDrawColor(200,200,210);
  doc.setLineWidth(0.3);
  doc.line(14,footY,W-14,footY);
  doc.setFont("helvetica","normal");
  doc.setFontSize(7);
  doc.setTextColor(150,150,160);
  doc.text("Generado: "+new Date().toLocaleString("es-MX"),14,footY+5);
  if(cfg.website)doc.text(cfg.website,108,footY+5,{align:"center"});
  doc.setFont("helvetica","italic");
  doc.setFontSize(6);
  doc.setTextColor(180,180,190);
  doc.text("OC Agenda · Oscar Caldera",W-14,footY+5,{align:"right"});

  doc.save("Reporte_"+moName.replace(/ /g,"_")+"_"+yr+".pdf");
}

function reqNotif(){if("Notification"in window&&Notification.permission==="default")Notification.requestPermission()}
function chkReminders(evs){if(!("Notification"in window)||Notification.permission!=="granted")return;var now=Date.now();evs.forEach(function(ev){if(ev.estado==="Cancelado"||!ev.fecha||!ev.hora)return;var dt=new Date(ev.fecha+"T"+ev.hora+":00").getTime(),d=dt-now;if(d>0&&d<=7200000&&d>7140000)new Notification("🎤 Evento en 2 horas",{body:ev.tipo+" - "+ev.contacto,icon:"./icons/icon-192.svg"});if(d>0&&d<=86400000&&d>86340000)new Notification("🎤 Evento mañana",{body:ev.tipo+" - "+ev.contacto+" "+ft(ev.hora),icon:"./icons/icon-192.svg"})})}

function shareWA(ev,cfg,pkgs,prices,mpkgs){var total=ct(ev,pkgs,prices,mpkgs),saldo=total-(ev.anticipo||0);var pName="";if(ev.tipo==="Por hora"){var pkg=pkgs.find(function(p){return p.id===ev.paquete_id});if(pkg)pName=" ("+(pkg.icono||"🎤")+" "+pkg.nombre+")"}if(isTipo2(ev.tipo,cfg)){var mp=mpkgs.find(function(p){return p.id===ev.misa_paquete_id});if(mp)pName=" ("+(mp.icono||t2icono(cfg))+" "+mp.nombre+")"}var m="🎤 *"+cfg.nombre+" — Resumen de Evento*\n\n📋 *Tipo:* "+ev.tipo+pName+"\n📅 *Fecha:* "+fd(ev.fecha)+"\n";if(ev.hora)m+="🕐 *Inicio:* "+ft(ev.hora)+"\n🕐 *Fin:* "+calcEnd(ev.hora,ev.tipo==="Por hora"?ev.horas:1)+"\n";m+="💰 *Total:* "+fm(total)+"\n";if(ev.anticipo)m+="💵 *Anticipo:* "+fm(ev.anticipo)+"\n📊 *Restante:* "+fm(saldo)+"\n";if(ev.canciones&&ev.canciones.some(function(c){return c.trim()})){m+="\n🎵 *Canciones:*\n";ev.canciones.forEach(function(c,i){if(c.trim())m+="   "+(i+1)+". "+c+"\n"});}m+="\n✅ *Estado:* "+ev.estado;window.open("https://wa.me/?text="+encodeURIComponent(m),"_blank")}
